<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PG Study Tracker</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
}

.container {
  max-width: 750px;
  margin: auto;
  padding: 30px 20px 80px;
}

h1 { margin-bottom: 5px; }

.subtitle {
  color: #777;
  margin-top: 0;
  margin-bottom: 25px;
}

/* OVERALL */

.overall {
  background: white;
  border-radius: 16px;
  padding: 22px;
  margin-bottom: 20px;
  box-shadow: 0 2px 10px rgba(0,0,0,.05);
}

.overall-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.overall-title {
  font-size: 20px;
  font-weight: 600;
}

.overall-percent {
  font-size: 24px;
  font-weight: 700;
}

.progress-track {
  height: 14px;
  background: #e5e5ea;
  border-radius: 20px;
  overflow: hidden;
  margin-top: 14px;
}

.progress-fill {
  height: 100%;
  background: #34c759;
  transition: width .3s;
}

.stats {
  color: #777;
  font-size: 14px;
  margin-top: 9px;
}

/* SEARCH */

.search {
  width: 100%;
  padding: 13px 15px;
  border: 1px solid #ddd;
  border-radius: 12px;
  font-size: 16px;
  margin-bottom: 15px;
  background: white;
}

/* GENERAL BUTTONS */

button {
  border: none;
  border-radius: 8px;
  padding: 8px 11px;
  cursor: pointer;
  font-size: 14px;
}

.primary {
  background: #007aff;
  color: white;
}

.secondary {
  background: #ededf0;
  color: #1d1d1f;
}

.small {
  padding: 5px 8px;
  font-size: 12px;
}

.danger {
  background: none;
  color: #aaa;
  padding: 5px;
}

.danger:hover { color: red; }

/* CATEGORY */

.category {
  margin-top: 25px;
}

.category-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.category-name {
  font-size: 19px;
  font-weight: 700;
  flex: 1;
  cursor: pointer;
}

.category-arrow {
  cursor: pointer;
  font-size: 18px;
  width: 20px;
}

.category-content.hidden {
  display: none;
}

/* SUBJECT */

.subject {
  background: white;
  border-radius: 13px;
  margin-bottom: 10px;
  padding: 14px 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,.05);
}

.subject-main {
  display: flex;
  align-items: center;
  gap: 8px;
}

.subject-arrow {
  cursor: pointer;
  font-size: 17px;
  width: 20px;
}

.subject-name {
  font-weight: 600;
  font-size: 17px;
  flex: 1;
  cursor: pointer;
}

.subject-count {
  color: #888;
  font-size: 13px;
}

.subject-actions {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.subject-details {
  margin-top: 14px;
}

.subject-details.hidden {
  display: none;
}

/* SUBJECT PROGRESS */

.subject-progress {
  margin-bottom: 15px;
  display: none;
}

.subject-progress.visible {
  display: block;
}

.subject-progress .progress-track {
  height: 9px;
  margin-top: 8px;
}

.subject-progress-text {
  font-size: 13px;
  color: #777;
  margin-top: 6px;
}

/* TOPICS */

.topic {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 2px;
}

.topic input {
  width: 19px;
  height: 19px;
  cursor: pointer;
  flex-shrink: 0;
}

.topic span {
  flex: 1;
}

.topic.completed span {
  text-decoration: line-through;
  color: #999;
}

/* TOP BUTTONS */

.top-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.top-actions button {
  flex: 1;
  padding: 12px;
}

/* SELECT */

select {
  border: 1px solid #ddd;
  border-radius: 7px;
  padding: 5px;
  background: white;
  font-size: 12px;
}

/* MODAL */

.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  inset: 0;
  background: rgba(0,0,0,.4);
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal.visible {
  display: flex;
}

.modal-content {
  background: white;
  border-radius: 16px;
  padding: 22px;
  width: 100%;
  max-width: 500px;
}

.modal-content h2 {
  margin-top: 0;
}

textarea {
  width: 100%;
  min-height: 220px;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 12px;
  font-family: inherit;
  font-size: 16px;
  resize: vertical;
}

.modal-buttons {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 15px;
}

.empty {
  color: #999;
  font-size: 14px;
  padding: 10px 0;
}

@media(max-width:600px) {
  .subject-main {
    align-items: flex-start;
  }

  .subject-actions {
    max-width: 150px;
    justify-content: flex-end;
  }

  .top-actions {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>PG Study Tracker</h1>
<p class="subtitle">One topic at a time.</p>

<div class="overall">
  <div class="overall-header">
    <div class="overall-title">Overall Syllabus Progress</div>
    <div class="overall-percent" id="overallPercent">0%</div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="overallFill" style="width:0%"></div>
  </div>

  <div class="stats" id="overallStats">
    0 of 0 topics completed
  </div>
</div>

<input
  id="search"
  class="search"
  type="text"
  placeholder="🔎 Search subjects or topics..."
  oninput="render()"
>

<div class="top-actions">
  <button class="primary" onclick="addSubject()">+ Add Subject</button>
  <button class="secondary" onclick="addCategory()">+ Add Category</button>
</div>

<div id="app"></div>

</div>


<!-- TOPICS MODAL -->

<div class="modal" id="topicModal">
  <div class="modal-content">

    <h2>Add Topics</h2>

    <p style="color:#777;font-size:14px;">
      Paste multiple topics. Put each topic on a new line.
    </p>

    <textarea id="topicInput"
      placeholder="Demography
Epidemiology
Screening
Biostatistics"></textarea>

    <div class="modal-buttons">
      <button class="secondary" onclick="closeTopicModal()">Cancel</button>
      <button class="primary" onclick="confirmTopics()">Add Topics</button>
    </div>

  </div>
</div>


<script>

/*
Existing data structure is preserved.
New optional fields:
subject.category
subject.expanded
subject.showProgress

Categories are stored separately.
*/

let data =
  JSON.parse(localStorage.getItem("pgStudyTracker")) || [];

let categories =
  JSON.parse(localStorage.getItem("pgStudyCategories")) || [];

let categoryStates =
  JSON.parse(localStorage.getItem("pgStudyCategoryStates")) || {};

let currentSubjectIndex = null;


/* MIGRATE EXISTING DATA */

data.forEach(subject => {

  if (subject.category === undefined)
    subject.category = "Uncategorized";

  if (subject.expanded === undefined)
    subject.expanded = false;

  if (subject.showProgress === undefined)
    subject.showProgress = false;

});


function save() {

  localStorage.setItem(
    "pgStudyTracker",
    JSON.stringify(data)
  );

  localStorage.setItem(
    "pgStudyCategories",
    JSON.stringify(categories)
  );

  localStorage.setItem(
    "pgStudyCategoryStates",
    JSON.stringify(categoryStates)
  );

}


/* OVERALL */

function updateOverall() {

  let total = 0;
  let completed = 0;

  data.forEach(subject => {

    total += subject.topics.length;

    completed += subject.topics.filter(
      topic => topic.completed
    ).length;

  });

  const percent =
    total === 0
      ? 0
      : Math.round((completed / total) * 100);

  document.getElementById("overallPercent")
    .textContent = percent + "%";

  document.getElementById("overallFill")
    .style.width = percent + "%";

  document.getElementById("overallStats")
    .textContent =
      completed + " of " + total + " topics completed";

}


/* RENDER */

function render() {

  updateOverall();

  const app =
    document.getElementById("app");

  app.innerHTML = "";

  const query =
    document.getElementById("search")
      .value
      .trim()
      .toLowerCase();


  /*
  Get all categories currently needed.
  Uncategorized always exists if required.
  */

  let allCategories = [...categories];

  if (
    data.some(
      subject =>
        !subject.category ||
        subject.category === "Uncategorized"
    )
  ) {
    if (!allCategories.includes("Uncategorized"))
      allCategories.unshift("Uncategorized");
  }


  allCategories.forEach(category => {

    let subjects =
      data
        .map((subject, index) => ({
          subject,
          originalIndex: index
        }))
        .filter(item =>
          (item.subject.category || "Uncategorized")
          === category
        );


    /*
    SEARCH FILTER
    */

    if (query) {

      subjects =
        subjects.filter(item => {

          const subjectMatch =
            item.subject.name
              .toLowerCase()
              .includes(query);

          const topicMatch =
            item.subject.topics.some(
              topic =>
                topic.name
                  .toLowerCase()
                  .includes(query)
            );

          return subjectMatch || topicMatch;

        });

    }


    if (query && subjects.length === 0)
      return;


    const categoryDiv =
      document.createElement("div");

    categoryDiv.className = "category";


    const collapsed =
      categoryStates[category] === true;


    categoryDiv.innerHTML = `

      <div class="category-header">

        <div
          class="category-arrow"
          onclick="toggleCategory('${escapeJS(category)}')">
          ${collapsed ? "▶" : "▼"}
        </div>

        <div
          class="category-name"
          onclick="toggleCategory('${escapeJS(category)}')">
          ${escapeHTML(category)}
        </div>

        ${
          category !== "Uncategorized"
          ? `
            <button
              class="danger"
              title="Delete category"
              onclick="deleteCategory('${escapeJS(category)}')">
              ✕
            </button>
          `
          : ""
        }

      </div>

      <div
        class="category-content
        ${collapsed && !query ? "hidden" : ""}"
        id="category-${safeId(category)}">
      </div>

    `;


    app.appendChild(categoryDiv);


    const categoryContent =
      categoryDiv.querySelector(".category-content");


    if (subjects.length === 0) {

      categoryContent.innerHTML =
        `<div class="empty">No subjects</div>`;

    }


    subjects.forEach(item => {

      renderSubject(
        categoryContent,
        item.subject,
        item.originalIndex,
        query
      );

    });

  });


  save();

}


/* RENDER SUBJECT */

function renderSubject(
  container,
  subject,
  subjectIndex,
  query
) {

  const completed =
    subject.topics.filter(
      topic => topic.completed
    ).length;

  const total =
    subject.topics.length;

  const percent =
    total === 0
      ? 0
      : Math.round(
          completed / total * 100
        );


  /*
  If searching for a topic,
  automatically show subject contents.
  */

  const searchTopicMatch =
    query &&
    subject.topics.some(
      topic =>
        topic.name
          .toLowerCase()
          .includes(query)
    );

  const expanded =
    subject.expanded ||
    searchTopicMatch;


  const div =
    document.createElement("div");

  div.className = "subject";


  let categoryOptions =
    [`<option value="Uncategorized">
      Uncategorized
    </option>`];

  categories.forEach(category => {

    categoryOptions.push(
      `<option
        value="${escapeHTML(category)}"
        ${
          subject.category === category
            ? "selected"
            : ""
        }>
        ${escapeHTML(category)}
      </option>`
    );

  });


  div.innerHTML = `

    <div class="subject-main">

      <div
        class="subject-arrow"
        onclick="toggleSubject(${subjectIndex})">
        ${expanded ? "▼" : "▶"}
      </div>


      <div
        class="subject-name"
        onclick="toggleSubject(${subjectIndex})">

        ${escapeHTML(subject.name)}

        <span class="subject-count">
          ${completed}/${total}
        </span>

      </div>


      <div class="subject-actions">

        <button
          class="secondary small"
          title="Move up"
          onclick="moveSubject(${subjectIndex}, -1)">
          ↑
        </button>

        <button
          class="secondary small"
          title="Move down"
          onclick="moveSubject(${subjectIndex}, 1)">
          ↓
        </button>

        <button
          class="secondary small"
          onclick="toggleSubjectProgress(${subjectIndex})">
          ${
            subject.showProgress
              ? "Hide Progress"
              : "Progress"
          }
        </button>

      </div>

    </div>


    <div
      class="subject-progress
      ${subject.showProgress ? "visible" : ""}">

      <div class="progress-track">
        <div
          class="progress-fill"
          style="width:${percent}%">
        </div>
      </div>

      <div class="subject-progress-text">
        ${percent}% ·
        ${completed} of ${total} topics completed
      </div>

    </div>


    <div
      class="subject-details
      ${expanded ? "" : "hidden"}">

      <div style="
        display:flex;
        gap:8px;
        align-items:center;
        margin-bottom:12px;
        flex-wrap:wrap;
      ">

        <button
          class="secondary small"
          onclick="openTopicModal(${subjectIndex})">
          + Add Topics
        </button>

        <select
          onchange="changeCategory(
            ${subjectIndex},
            this.value
          )">

          ${categoryOptions.join("")}

        </select>

        <button
          class="danger"
          onclick="deleteSubject(${subjectIndex})">
          Delete Subject
        </button>

      </div>

      <div class="topics"></div>

    </div>

  `;


  container.appendChild(div);


  const topicContainer =
    div.querySelector(".topics");


  subject.topics.forEach(
    (topic, topicIndex) => {

      /*
      When searching, only show matching topics
      unless subject name itself matches.
      */

      const subjectMatches =
        query &&
        subject.name
          .toLowerCase()
          .includes(query);

      if (
        query &&
        !subjectMatches &&
        !topic.name
          .toLowerCase()
          .includes(query)
      ) return;


      const topicDiv =
        document.createElement("div");

      topicDiv.className =
        "topic" +
        (topic.completed
          ? " completed"
          : "");


      topicDiv.innerHTML = `

        <input
          type="checkbox"
          ${topic.completed ? "checked" : ""}
          onchange="
            toggleTopic(
              ${subjectIndex},
              ${topicIndex}
            )
          "
        >

        <span>
          ${escapeHTML(topic.name)}
        </span>

        <button
          class="danger"
          onclick="
            deleteTopic(
              ${subjectIndex},
              ${topicIndex}
            )
          ">
          ✕
        </button>

      `;


      topicContainer.appendChild(
        topicDiv
      );

    }
  );

}


/* SUBJECT EXPAND */

function toggleSubject(index) {

  data[index].expanded =
    !data[index].expanded;

  save();
  render();

}


/* SUBJECT PROGRESS */

function toggleSubjectProgress(index) {

  data[index].showProgress =
    !data[index].showProgress;

  save();
  render();

}


/* CATEGORY */

function addCategory() {

  const name =
    prompt("Category name:");

  if (!name || !name.trim())
    return;

  const clean =
    name.trim();

  if (
    clean === "Uncategorized" ||
    categories.includes(clean)
  ) {

    alert(
      "That category already exists."
    );

    return;

  }

  categories.push(clean);

  save();
  render();

}


function toggleCategory(category) {

  categoryStates[category] =
    !categoryStates[category];

  save();
  render();

}


function deleteCategory(category) {

  if (
    !confirm(
      "Delete this category? Subjects inside it will be moved to Uncategorized."
    )
  ) return;


  data.forEach(subject => {

    if (subject.category === category)
      subject.category =
        "Uncategorized";

  });


  categories =
    categories.filter(
      item => item !== category
    );


  delete categoryStates[category];


  save();
  render();

}


/* CHANGE CATEGORY */

function changeCategory(
  subjectIndex,
  category
) {

  data[subjectIndex].category =
    category;

  save();
  render();

}


/* MOVE SUBJECT */

function moveSubject(
  index,
  direction
) {

  const category =
    data[index].category ||
    "Uncategorized";


  const indexes =
    data
      .map((subject, i) => ({
        subject,
        index: i
      }))
      .filter(item =>
        (item.subject.category ||
          "Uncategorized")
        === category
      )
      .map(item => item.index);


  const position =
    indexes.indexOf(index);


  const targetPosition =
    position + direction;


  if (
    targetPosition < 0 ||
    targetPosition >= indexes.length
  ) return;


  const targetIndex =
    indexes[targetPosition];


  const temp =
    data[index];

  data[index] =
    data[targetIndex];

  data[targetIndex] =
    temp;


  save();
  render();

}


/* ADD SUBJECT */

function addSubject() {

  const name =
    prompt("Subject name:");

  if (!name || !name.trim())
    return;


  data.push({

    name: name.trim(),

    topics: [],

    category:
      "Uncategorized",

    expanded:
      false,

    showProgress:
      false

  });


  save();
  render();

}


/* TOPIC MODAL */

function openTopicModal(index) {

  currentSubjectIndex =
    index;

  document.getElementById(
    "topicInput"
  ).value = "";

  document.getElementById(
    "topicModal"
  ).classList.add(
    "visible"
  );

  document.getElementById(
    "topicInput"
  ).focus();

}


function closeTopicModal() {

  document.getElementById(
    "topicModal"
  ).classList.remove(
    "visible"
  );

  currentSubjectIndex =
    null;

}


function confirmTopics() {

  if (currentSubjectIndex === null)
    return;


  const input =
    document.getElementById(
      "topicInput"
    ).value;


  const topics =
    input
      .split("\n")
      .map(topic =>
        topic.trim()
      )
      .filter(Boolean);


  if (!topics.length)
    return;


  topics.forEach(name => {

    data[
      currentSubjectIndex
    ].topics.push({

      name,

      completed: false

    });

  });


  save();
  closeTopicModal();
  render();

}


/* TOPIC */

function toggleTopic(
  subjectIndex,
  topicIndex
) {

  data[
    subjectIndex
  ].topics[
    topicIndex
  ].completed =

    !data[
      subjectIndex
    ].topics[
      topicIndex
    ].completed;


  save();
  render();

}


function deleteTopic(
  subjectIndex,
  topicIndex
) {

  if (
    !confirm(
      "Delete this topic?"
    )
  ) return;


  data[
    subjectIndex
  ].topics.splice(
    topicIndex,
    1
  );


  save();
  render();

}


/* DELETE SUBJECT */

function deleteSubject(index) {

  if (
    !confirm(
      "Delete this subject and all its topics?"
    )
  ) return;


  data.splice(index, 1);

  save();
  render();

}


/* HELPERS */

function escapeHTML(text) {

  const div =
    document.createElement("div");

  div.textContent = text;

  return div.innerHTML;

}


function escapeJS(text) {

  return text
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'");

}


function safeId(text) {

  return text
    .replace(/[^a-zA-Z0-9]/g, "_");

}


/* INITIAL */

save();
render();

</script>

</body>
</html>
